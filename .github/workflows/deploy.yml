name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/add-background-music-6OwRG
      - claude/family-planner-app-f2qBo
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout birthday site
        uses: actions/checkout@v4
        with:
          ref: claude/add-background-music-6OwRG

      - name: Add family planner to /planner subfolder
        run: |
          git fetch origin claude/family-planner-app-f2qBo
          mkdir -p planner
          git show origin/claude/family-planner-app-f2qBo:index.html > planner/index.html

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
