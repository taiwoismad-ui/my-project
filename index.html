<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6C63FF">
<title>Семейный Планировщик 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --pr: #6C63FF; --pr-d: #5349E0; --pr-l: rgba(108,99,255,.12);
  --ac: #FF6584; --ok: #43B89C; --ok-l: rgba(67,184,156,.12);
  --wa: #FF9F43; --wa-l: rgba(255,159,67,.12);
  --er: #FF4757; --er-l: rgba(255,71,87,.12);
  --bg: #F7F8FC; --sf: #fff; --sf2: #F0F1F7; --sf3: #E8E9F3;
  --tx: #1A1A2E; --tx2: #6B7280; --tx3: #9CA3AF; --bd: #E5E7EB;
  --r1: 8px; --r2: 12px; --r3: 16px; --r4: 24px; --rf: 999px;
  --s0: 0 1px 3px rgba(0,0,0,.05); --s1: 0 2px 8px rgba(0,0,0,.07);
  --s2: 0 4px 16px rgba(0,0,0,.10); --s3: 0 8px 32px rgba(0,0,0,.14);
  --tab-h: 64px; --hdr-h: 60px; --mw: 600px; --f: "Inter",-apple-system,sans-serif; --t: .18s ease;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0F0F1A; --sf:#1A1A2E; --sf2:#252540; --sf3:#2D2D50;
  --tx:#F1F2FB; --tx2:#9CA3AF; --tx3:#6B7280; --bd:#2D2D4E;
  --s0:0 1px 3px rgba(0,0,0,.25); --s1:0 2px 8px rgba(0,0,0,.3);
  --s2:0 4px 16px rgba(0,0,0,.35); --s3:0 8px 32px rgba(0,0,0,.4);
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100dvh;
  max-width:var(--mw);margin:0 auto;overflow-x:hidden;-webkit-font-smoothing:antialiased}
@media(min-width:600px){body{border-left:1px solid var(--bd);border-right:1px solid var(--bd)}}
a{color:inherit;text-decoration:none}
button{border:none;background:none;cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit}

/* Layout */
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
#main{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.tab-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.tab-panel{display:none;animation:fadeIn .18s ease}
.tab-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

/* Setup */
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100dvh;padding:32px 24px;background:var(--bg)}
.setup-logo{font-size:60px;margin-bottom:12px}
.setup-title{font-size:26px;font-weight:800;text-align:center;margin-bottom:8px}
.setup-sub{font-size:15px;color:var(--tx2);text-align:center;margin-bottom:36px;line-height:1.5}
.setup-card{background:var(--sf);border-radius:var(--r4);padding:28px;width:100%;max-width:400px;box-shadow:var(--s2)}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  height:var(--hdr-h);background:var(--sf);border-bottom:1px solid var(--bd);
  flex-shrink:0;position:sticky;top:0;z-index:10}
.hdr-title{font-size:20px;font-weight:700}
.hdr-right{display:flex;align-items:center;gap:8px}

/* Tab bar */
.tab-bar{display:flex;align-items:center;background:var(--sf);border-top:1px solid var(--bd);
  height:var(--tab-h);flex-shrink:0;padding:0 4px;
  padding-bottom:env(safe-area-inset-bottom,0);position:sticky;bottom:0;z-index:10}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:6px 2px;border-radius:var(--r2);cursor:pointer;
  transition:all var(--t);color:var(--tx3);background:none;border:none;font-family:inherit}
.tb.on{color:var(--pr)}
.tb .ti{font-size:21px;line-height:1;transition:transform .15s}
.tb.on .ti{transform:scale(1.1)}
.tb .tl{font-size:10px;font-weight:500;letter-spacing:.2px}

/* Form */
.fg{margin-bottom:16px}
.lbl{display:block;font-size:12px;font-weight:600;color:var(--tx2);
  margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.inp{width:100%;padding:13px 16px;background:var(--sf2);border:1.5px solid var(--bd);
  border-radius:var(--r2);font-size:15px;color:var(--tx);outline:none;
  transition:border-color var(--t);-webkit-appearance:none}
.inp:focus{border-color:var(--pr);background:var(--sf)}
.inp::placeholder{color:var(--tx3)}
textarea.inp{resize:vertical;min-height:90px;line-height:1.5}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 20px;border-radius:var(--r2);font-size:15px;font-weight:600;
  cursor:pointer;border:none;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-pr{background:var(--pr);color:#fff}.btn-pr:hover{background:var(--pr-d)}
.btn-sc{background:var(--sf2);color:var(--tx)}.btn-sc:hover{background:var(--sf3)}
.btn-er{background:var(--er);color:#fff}
.btn-ol{background:transparent;border:1.5px solid var(--pr);color:var(--pr)}
.btn-gh{background:transparent;color:var(--pr)}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:var(--r1)}
.btn-lg{padding:15px 24px;font-size:16px}
.btn-fw{width:100%}
.btn-add{background:var(--pr);color:#fff;width:40px;height:40px;border-radius:var(--rf);
  font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-ic{width:32px;height:32px;border-radius:var(--r1);display:flex;align-items:center;
  justify-content:center;cursor:pointer;background:none;border:none;font-size:15px;
  color:var(--tx3);transition:all .15s}
.btn-ic:hover{background:var(--sf2);color:var(--tx)}
.btn-ic.er:hover{background:var(--er-l);color:var(--er)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;
  border-radius:var(--rf);font-size:11px;font-weight:600}
.bdg-pr{background:var(--pr-l);color:var(--pr)}
.bdg-ok{background:var(--ok-l);color:var(--ok)}
.bdg-wa{background:var(--wa-l);color:var(--wa)}
.bdg-er{background:var(--er-l);color:var(--er)}
.bdg-nu{background:var(--sf2);color:var(--tx2)}

/* Avatar */
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;color:#fff;flex-shrink:0}

/* Color picker */
.cg{display:flex;flex-wrap:wrap;gap:10px}
.cs{width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:16px;transition:transform .15s;border:3px solid transparent}
.cs:hover{transform:scale(1.1)}
.cs.on{border-color:#fff;box-shadow:var(--s2)}

/* Chips */
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:7px 14px;border-radius:var(--rf);font-size:13px;font-weight:500;
  cursor:pointer;background:var(--sf2);color:var(--tx2);border:none;
  font-family:inherit;transition:all .15s;-webkit-tap-highlight-color:transparent}
.chip.on{background:var(--pr);color:#fff}
.chip:active{transform:scale(.96)}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  display:flex;align-items:flex-end;animation:moIn .18s ease;backdrop-filter:blur(2px)}
@keyframes moIn{from{opacity:0}to{opacity:1}}
.ms{background:var(--sf);border-radius:var(--r4) var(--r4) 0 0;width:100%;
  max-width:var(--mw);margin:0 auto;padding:0 24px 48px;max-height:90dvh;
  overflow-y:auto;animation:msUp .22s cubic-bezier(.32,.72,0,1)}
@keyframes msUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:40px;height:4px;background:var(--bd);border-radius:2px;margin:14px auto 20px}
.mt{font-size:18px;font-weight:700;margin-bottom:20px}
.ma{display:flex;gap:10px;margin-top:20px}
.ma .btn{flex:1}

/* Section header */
.sh{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 6px}
.st{font-size:12px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}

/* Empty state */
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 32px;text-align:center;gap:10px}
.es-ic{font-size:52px;opacity:.4}
.es-t{font-size:16px;font-weight:600;color:var(--tx2)}
.es-s{font-size:13px;color:var(--tx3);line-height:1.5}

/* Shopping */
.si{display:flex;align-items:center;gap:12px;padding:13px 20px;
  background:var(--sf);border-bottom:1px solid var(--bd);transition:background var(--t)}
.si:last-child{border-bottom:none}
.si.ck{opacity:.55}
.cb{width:24px;height:24px;border-radius:50%;border:2px solid var(--bd);background:transparent;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  cursor:pointer;transition:all .15s;font-size:12px;color:transparent}
.cb.on{background:var(--ok);border-color:var(--ok);color:#fff}
.sn{flex:1;font-size:15px;font-weight:500;color:var(--tx);transition:all var(--t)}
.si.ck .sn{text-decoration:line-through;color:var(--tx3)}
.ia{display:flex;align-items:center;gap:2px;opacity:0;transition:opacity var(--t)}
.si:hover .ia,.ia:focus-within{opacity:1}
@media(hover:none){.ia{opacity:1}}

/* Sub-tabs */
.stabs{display:flex;border-bottom:1px solid var(--bd);background:var(--sf)}
.stab{flex:1;padding:13px 6px;text-align:center;font-size:13px;font-weight:500;
  color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;
  transition:all var(--t);background:none;border-left:none;border-right:none;
  border-top:none;font-family:inherit}
.stab.on{color:var(--pr);border-bottom-color:var(--pr)}

/* Wishlist cards */
.wg{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px}
@media(min-width:480px){.wg{grid-template-columns:1fr 1fr 1fr}}
.wc{background:var(--sf);border-radius:var(--r3);box-shadow:var(--s1);overflow:hidden;display:flex;flex-direction:column}
.wc-ph{width:100%;height:95px;background:var(--pr-l);display:flex;align-items:center;justify-content:center;font-size:30px}
.wc-img{width:100%;height:95px;object-fit:cover}
.wc-b{padding:10px 12px 12px;flex:1;display:flex;flex-direction:column;gap:5px}
.wc-t{font-size:13px;font-weight:600;color:var(--tx);line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.wc-url{font-size:11px;color:var(--tx3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wc-f{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.wl{padding:12px 16px}
.wli{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--sf);
  border-radius:var(--r2);margin-bottom:8px;box-shadow:var(--s0)}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--sf)}
.cal-ml{font-size:17px;font-weight:700;text-transform:capitalize}
.cal-dh{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px;background:var(--sf);border-bottom:1px solid var(--bd)}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--tx3);padding:7px 2px;text-transform:uppercase}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:6px 10px;background:var(--sf)}
.cd{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;border-radius:var(--r1);cursor:pointer;transition:background .12s;font-size:13px;color:var(--tx)}
.cd:hover{background:var(--sf2)}
.cd.om{color:var(--tx3)}
.cd.td{font-weight:700;color:var(--pr)}
.cd.sel{background:var(--pr);color:#fff!important}
.dn{font-size:13px;line-height:1}
.edots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap}
.edot{width:5px;height:5px;border-radius:50%}
.ev-list{padding:14px 16px}
.evc{display:flex;background:var(--sf);border-radius:var(--r2);margin-bottom:8px;
  box-shadow:var(--s0);overflow:hidden;cursor:pointer;transition:transform .12s}
.evc:active{transform:scale(.99)}
.ev-bar{width:4px;flex-shrink:0}
.ev-b{flex:1;padding:11px 13px}
.ev-t{font-size:14px;font-weight:600;margin-bottom:3px}
.ev-m{font-size:12px;color:var(--tx3);display:flex;gap:8px;flex-wrap:wrap}

/* Notes */
.nc{display:flex;gap:12px;padding:13px 15px;background:var(--sf);border-radius:var(--r3);
  margin-bottom:10px;box-shadow:var(--s0);cursor:pointer;transition:transform .12s}
.nc:active{transform:scale(.99)}
.nc-ic{width:40px;height:40px;border-radius:var(--r2);display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0}
.nc-b{flex:1;min-width:0}
.nc-t{font-size:15px;font-weight:600;margin-bottom:3px}
.nc-p{font-size:13px;color:var(--tx2);display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;line-height:1.4;margin-bottom:5px}
.nc-m{font-size:11px;color:var(--tx3)}
.fscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  padding:9px 16px;display:flex;gap:8px;background:var(--sf);border-bottom:1px solid var(--bd)}
.fscroll::-webkit-scrollbar{display:none}

/* Profile */
.ph{background:linear-gradient(135deg,var(--pr),var(--pr-d));padding:44px 24px 56px;
  display:flex;flex-direction:column;align-items:center;gap:8px}
.ph-name{font-size:22px;font-weight:700;color:#fff}
.pb{background:var(--bg);border-radius:var(--r4) var(--r4) 0 0;margin-top:-28px;
  padding:28px 20px 100px}
.pc{background:var(--sf);border-radius:var(--r3);padding:16px;margin-bottom:12px;box-shadow:var(--s0)}
.pc-t{font-size:14px;font-weight:600;color:var(--tx2);margin-bottom:12px}
.pr-row{display:flex;align-items:center;gap:12px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd)}
.ir:last-child{border-bottom:none}
.il{font-size:14px;color:var(--tx2)}
.iv{font-size:14px;font-weight:500}

/* URL row */
.urlrow{display:flex;gap:8px;margin-bottom:14px}
.urlrow .inp{flex:1;margin:0}

/* Toast */
.toast{position:fixed;bottom:calc(var(--tab-h) + 10px);left:50%;transform:translateX(-50%);
  background:var(--tx);color:var(--bg);padding:9px 18px;border-radius:var(--rf);
  font-size:13px;font-weight:500;z-index:200;white-space:nowrap;pointer-events:none;
  animation:tIn .18s ease, tOut .2s ease 2.1s forwards}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tOut{to{opacity:0}}

/* Priority colors */
.pri-want{background:rgba(255,101,132,.15);color:#FF6584}
.pri-some{background:rgba(156,163,175,.18);color:#9CA3AF}
</style>
</head>
<body>
<div id="app">
  <div id="setup" style="display:none"></div>
  <div id="main" style="display:none">
    <div id="hdr"></div>
    <div class="tab-content">
      <div id="tp-shopping" class="tab-panel"></div>
      <div id="tp-wishlist" class="tab-panel"></div>
      <div id="tp-calendar" class="tab-panel"></div>
      <div id="tp-notes" class="tab-panel"></div>
      <div id="tp-profile" class="tab-panel"></div>
    </div>
    <nav class="tab-bar" id="tbar"></nav>
  </div>
</div>
<div id="mroot"></div>

<script>
// =========================================================
// СЕМЕЙНЫЙ ПЛАНИРОВЩИК  — vanilla JS + localStorage
// =========================================================

// --- CONFIG ---
const COLORS=['#6C63FF','#FF6584','#43B89C','#FF9F43','#5352ED','#2ED573','#FF4757','#1E90FF'];
const PRI={want:'🔥 Очень хочу',some:'⭐ Когда-нибудь'};
const PRI_C={want:'#FF6584',some:'#9CA3AF'};
const REC={none:'Без повтора',weekly:'Еженедельно',monthly:'Ежемесячно'};
const NCATS={
  recipes:{l:'Рецепты',i:'🍽️',c:'#FF9F43'},
  travel:{l:'Путешествия',i:'✈️',c:'#1E90FF'},
  passwords:{l:'Пароли',i:'🔒',c:'#FF4757'},
  other:{l:'Другое',i:'📄',c:'#9CA3AF'}
};
const MO_RU=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DOW_RU=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

// --- STORAGE ---
const DB={
  get(k,d=null){try{const v=localStorage.getItem('fp_'+k);return v!==null?JSON.parse(v):d}catch{return d}},
  set(k,v){try{localStorage.setItem('fp_'+k,JSON.stringify(v))}catch{}}
};

// --- STATE ---
let U  = DB.get('users',[]);          // [{id,name,color}]
let CU = DB.get('cuid',null);         // current user id
let SH = DB.get('shop',[]);           // shopping items
let HW = DB.get('hwish',[]);          // home wishlist
let WP = DB.get('wpersonal',{});      // personal wishlists {uid:[]}
let WS = DB.get('wshared',[]);        // shared wishlist
let EV = DB.get('events',[]);         // calendar events
let NO = DB.get('notes',[]);          // notes

// UI state
let tab='shopping', wstab='personal', nfilt='all';
let calY=new Date().getFullYear(), calM=new Date().getMonth(), calSel=null;
let modalStack=[];

// --- UTILS ---
let _ic=Date.now();
const gid=()=>(++_ic).toString(36);
const today=()=>new Date().toISOString().slice(0,10);
const ini=n=>n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

function av(user,size=36){
  const fs=Math.round(size*.38);
  return `<span class="av" style="width:${size}px;height:${size}px;background:${user.color};font-size:${fs}px">${ini(user.name)}</span>`;
}

function priBadge(p){
  const cls=p==='want'?'pri-want':'pri-some';
  return `<span class="badge ${cls}">${PRI[p]||p}</span>`;
}

function fmtDate(ds){
  if(!ds)return'';
  return new Date(ds+'T12:00:00').toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
}

function timeAgo(iso){
  const d=Date.now()-new Date(iso).getTime();
  const m=Math.floor(d/60000);
  if(m<1)return'только что';
  if(m<60)return m+' мин. назад';
  const h=Math.floor(m/60);
  if(h<24)return h+' ч. назад';
  return Math.floor(h/24)+' дн. назад';
}

function toast(msg){
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

function save(k){
  const m={users:()=>DB.set('users',U),cuid:()=>DB.set('cuid',CU),
    shop:()=>DB.set('shop',SH),hwish:()=>DB.set('hwish',HW),
    wpersonal:()=>DB.set('wpersonal',WP),wshared:()=>DB.set('wshared',WS),
    events:()=>DB.set('events',EV),notes:()=>DB.set('notes',NO)};
  m[k]&&m[k]();
}

function cu(){return U.find(u=>u.id===CU)||null}
function partner(){return U.find(u=>u.id!==CU)||null}

// --- MODAL ---
function openModal(html,cb){
  const ov=document.createElement('div');
  ov.className='mo';
  ov.innerHTML=`<div class="ms"><div class="mh"></div>${html}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal()});
  document.getElementById('mroot').appendChild(ov);
  modalStack.push(ov);
  if(cb)setTimeout(()=>cb(ov),30);
  setTimeout(()=>{const inp=ov.querySelector('input,textarea');if(inp)inp.focus()},60);
}
function closeModal(){const o=modalStack.pop();if(o)o.remove()}

// --- ROUTING ---
function goTab(t){
  tab=t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='tp-'+t));
  renderTab(t);
}

function renderTab(t){
  const el=document.getElementById('tp-'+t);
  if(!el)return;
  const fn={shopping:rShopping,wishlist:rWishlist,calendar:rCalendar,notes:rNotes,profile:rProfile};
  if(fn[t])el.innerHTML=fn[t]();
}

function rTabBar(){
  const tabs=[
    {id:'shopping',i:'🛒',l:'Покупки'},{id:'wishlist',i:'🎁',l:'Вишлист'},

function checkRecurring(){
  const td=today();
  SH=SH.map(it=>{
    if(it.recurrence==='none'||!it.checked)return it;
    if(!it.lastRec)return{...it,lastRec:td};
    const diff=Math.floor((new Date(td)-new Date(it.lastRec))/86400000);
    if((it.recurrence==='weekly'&&diff>=7)||(it.recurrence==='monthly'&&diff>=28)){
      return{...it,checked:false,lastRec:td};
    }
    return it;
  });
  save('shop');
}

// =========================================================
function rCalendar(){
  const td=today(), sel=calSel||td;
  const first=new Date(calY,calM,1), last=new Date(calY,calM+1,0);
  const startDow=(first.getDay()+6)%7; // Mon=0
  const dim=last.getDate(), pDim=new Date(calY,calM,0).getDate();
  const evMap={};
  EV.forEach(e=>{if(!evMap[e.date])evMap[e.date]=[];evMap[e.date].push(e)});

  let cells='';
  // prev month filler
  for(let d=startDow-1;d>=0;d--){
    const day=pDim-d;
    const ds=`${calY}-${String(calM).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    cells+=`<div class="cd om" data-date="${ds}"><span class="dn">${day}</span></div>`;
  }
  // current month
  for(let d=1;d<=dim;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===td, isSel=ds===sel;
    const evs=evMap[ds]||[];
    const dots=evs.slice(0,3).map(e=>`<span class="edot" style="background:${e.createdByColor}"></span>`).join('');
    cells+=`<div class="cd ${isT?'td':''} ${isSel?'sel':''}" data-date="${ds}">
      <span class="dn">${d}</span>
      ${dots?`<div class="edots">${dots}</div>`:''}
    </div>`;
  }
  // next month filler
  const total=Math.ceil((startDow+dim)/7)*7;
  for(let d=1;d<=total-startDow-dim;d++){
    const nm=calM+2>12?1:calM+2, ny=calM+2>12?calY+1:calY;
    const ds=`${ny}-${String(nm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells+=`<div class="cd om" data-date="${ds}"><span class="dn">${d}</span></div>`;
  }

  const dayEvs=evMap[sel]||[];
  const dayLabel=fmtDate(sel);
  const evHtml=dayEvs.length
    ?dayEvs.map(e=>`
      <div class="evc">
        <div class="ev-bar" style="background:${e.createdByColor}"></div>
        <div class="ev-b">
          <div class="ev-t">${e.title}</div>
          <div class="ev-m">
            ${e.time?`⏰ ${e.time}`:''}
            <span>👤 ${e.createdByName}</span>
          </div>
          ${e.note?`<div style="font-size:12px;color:var(--tx2);margin-top:3px">${e.note}</div>`:''}
        </div>
        <button class="btn-ic er" data-a="del-ev" data-id="${e.id}" style="margin:8px 8px 0 0">🗑️</button>
      </div>`).join('')
    :`<div style="text-align:center;padding:18px;color:var(--tx3);font-size:13px">Нет событий в этот день</div>`;

  return `
    <div class="hdr">
      <span class="hdr-title">📅 Календарь</span>
      <div class="hdr-right"><button class="btn-add" data-a="add-ev">+</button></div>
    </div>
    <div class="cal-nav">
      <button class="btn btn-sc btn-sm" data-a="cal-prev">◀</button>
      <span class="cal-ml">${MO_RU[calM]} ${calY}</span>
      <button class="btn btn-sc btn-sm" data-a="cal-next">▶</button>
    </div>
    <div class="cal-dh">${DOW_RU.map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>
    <div class="cal-g">${cells}</div>
    <div class="ev-list">
      <div style="font-size:15px;font-weight:700;margin-bottom:10px;text-transform:capitalize">${dayLabel}</div>
      ${evHtml}
    </div>`;
}

    ov.querySelectorAll('.chip[data-cat]').forEach(c=>{
      c.addEventListener('click',()=>{
        ov.querySelectorAll('.chip[data-cat]').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.color=''});
        c.classList.add('on');
        const cat=NCATS[c.dataset.cat];
        if(cat){c.style.background=cat.c;c.style.color='#fff'}
      });
    });
  });
}

function saveNote(id){
  const title=document.getElementById('no-t')?.value.trim();
  if(!title){toast('Введите заголовок');return}
  const content=document.getElementById('no-c')?.value.trim()||'';
  const cat=document.querySelector('.chip[data-cat].on')?.dataset.cat||'other';
  const user=cu(), now=new Date().toISOString();
  if(id){NO=NO.map(n=>n.id===id?{...n,title,content,category:cat,lastEditedBy:user.id,lastEditedByName:user.name,updatedAt:now}:n)}
  else{NO.push({id:gid(),title,content,category:cat,lastEditedBy:user.id,lastEditedByName:user.name,createdAt:now,updatedAt:now})}
  save('notes');closeModal();renderTab('notes');toast('✅ Сохранено');
}

// =========================================================
// GLOBAL EVENT DELEGATION
// =========================================================
document.addEventListener('click', function(e){
  // Main tab buttons
  const tb=e.target.closest('[data-tab]');
  if(tb){goTab(tb.dataset.tab);return}

  // Sub-tabs (wishlist)
  const ws=e.target.closest('[data-ws]');
  if(ws){wstab=ws.dataset.ws;renderTab('wishlist');return}

  // Notes filter
  const nf=e.target.closest('[data-nf]');
  if(nf){nfilt=nf.dataset.nf;renderTab('notes');return}

  // Calendar day
  const cd=e.target.closest('.cd[data-date]');
  if(cd){calSel=cd.dataset.date;renderTab('calendar');return}

  // Chip toggles (recurrence, priority inside modals)
  const rc=e.target.closest('.chip[data-rec]');
  if(rc){rc.closest('.chip-row').querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));rc.classList.add('on');return}
  const pc=e.target.closest('.chip[data-pri]');
  if(pc){pc.closest('.chip-row').querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));pc.classList.add('on');return}

  // Action buttons
  const btn=e.target.closest('[data-a]');
  if(!btn)return;
  const a=btn.dataset.a, id=btn.dataset.id;

  switch(a){
    case 'close-mo': closeModal(); break;

    // Shopping
    case 'add-sh': openShModal(); break;
    case 'edit-sh': openShModal(id); break;
    case 'save-sh': saveSh(id||null); break;
    case 'toggle': {
      SH=SH.map(i=>i.id===id?{...i,checked:!i.checked}:i);
      save('shop');renderTab('shopping');break;
    }
    case 'del-sh': {
      if(confirm('Удалить этот товар?')){SH=SH.filter(i=>i.id!==id);save('shop');renderTab('shopping')}break;
    }
    case 'clear-ck': {
      if(confirm('Удалить все купленные товары?')){SH=SH.filter(i=>!i.checked);save('shop');renderTab('shopping')}break;
    }

    // Wishlist
    case 'add-wl': openWlModal(); break;
    case 'save-wl': saveWl(); break;
    case 'del-wl': delWl(btn.dataset.type,id); break;

    // Calendar
    case 'cal-prev': {
      if(calM===0){calM=11;calY--}else calM--;
      renderTab('calendar');break;
    }
    case 'cal-next': {
      if(calM===11){calM=0;calY++}else calM++;
      renderTab('calendar');break;
    }
    case 'add-ev': openEvModal(); break;
    case 'save-ev': saveEv(); break;
    case 'del-ev': {
      if(confirm('Удалить событие?')){EV=EV.filter(e=>e.id!==id);save('events');renderTab('calendar')}break;
    }

    // Notes
    case 'add-note': openNoteModal(); break;
    case 'edit-note': openNoteModal(id); break;
    case 'save-note': saveNote(id||null); break;
    case 'del-note': {
      if(confirm('Удалить заметку?')){NO=NO.filter(n=>n.id!==id);save('notes');closeModal();renderTab('notes')}break;
    }

    // Profile
    case 'chg-color': {
      U=U.map(u=>u.id===CU?{...u,color:btn.dataset.c}:u);
      save('users');renderTab('profile');toast('Цвет изменён!');break;
    }
    case 'add-partner': renderSetup(); break;
    case 'switch-u': {
      CU=id;save('cuid');
      toast('Переключились на '+U.find(u=>u.id===id)?.name);
      renderTab('profile');break;
    }
    case 'reset': {
      if(confirm('Удалить ВСЕ данные? Это нельзя отменить!')&&confirm('Вы уверены?')){
        localStorage.clear();location.reload();
      }break;
    }
  }
});

// =========================================================
// INIT
// =========================================================
function init(){
  if(U.length===0){
    renderSetup();
  }else{
    if(!CU||!U.find(u=>u.id===CU)){CU=U[0].id;save('cuid')}
    renderMain();
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
